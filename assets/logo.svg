<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <!-- Orange Moon -->
  <circle cx="18" cy="18" r="16" fill="#ff6b35"/>
  <!-- Pomeranian Silhouette -->
  <g fill="#0a0a0f">
    <!-- Body -->
    <ellipse cx="18" cy="24" rx="6" ry="5"/>
    <!-- Fluffy chest -->
    <ellipse cx="16" cy="21" rx="4.5" ry="4"/>
    <!-- Head -->
    <circle cx="14" cy="15.5" r="4"/>
    <!-- Snout -->
    <ellipse cx="11.5" cy="16.5" rx="2" ry="1.3"/>
    <!-- Ear left -->
    <polygon points="11,12 12.5,8.5 14,12"/>
    <!-- Ear right -->
    <polygon points="14.5,11.5 16,7.5 17.5,11.5"/>
    <!-- Fluffy tail curling up -->
    <path d="M23,21 Q27,18 25,13 Q24,11 22,12 Q24,14 23,18 Q22.5,20 23,21Z"/>
    <!-- Legs -->
    <rect x="13" y="27" width="2" height="3" rx="1"/>
    <rect x="19" y="27" width="2" height="3" rx="1"/>
  </g>
  <!-- Eye -->
  <circle cx="13" cy="15" r="0.8" fill="#ff6b35"/>
  <!-- Nose -->
  <circle cx="10.5" cy="16" r="0.7" fill="#ff6b35" opacity="0.7"/>
</svg>

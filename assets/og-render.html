<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #0a0b0d; width: 1200px; height: 630px; overflow: hidden; color: #e8e6e1; }
    svg { display: block; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
      <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#22252a" stroke-width="1" />
      </pattern>
    </defs>

    <rect width="1200" height="630" fill="#0a0b0d" />
    <rect width="1200" height="630" fill="url(#grid)" opacity="0.5" />

    <!-- Corner brackets -->
    <g stroke="#e8e6e1" stroke-width="2" fill="none">
      <polyline points="48,72 48,48 72,48" />
      <polyline points="1128,48 1152,48 1152,72" />
      <polyline points="48,558 48,582 72,582" />
      <polyline points="1128,582 1152,582 1152,558" />
    </g>

    <!-- Top telemetry row -->
    <g font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="3" fill="#8a8880">
      <circle cx="90" cy="92" r="4" fill="oklch(72% 0.14 145)" />
      <text x="104" y="97">MCC // SPK-01</text>
      <text x="600" y="97" text-anchor="middle">ALL SYSTEMS NOMINAL</text>
      <text x="1110" y="97" text-anchor="end">FIG.01 / TRAJECTORY</text>
    </g>
    <line x1="48" y1="115" x2="1152" y2="115" stroke="#22252a" stroke-width="1" />

    <!-- Orbital monogram -->
    <g transform="translate(180, 330)">
      <circle cx="0" cy="0" r="120" fill="none" stroke="#e8e6e1" stroke-width="1.2" opacity="0.45" />
      <ellipse cx="0" cy="0" rx="120" ry="46" fill="none" stroke="#e8e6e1" stroke-width="1.2" opacity="0.7" transform="rotate(-20)" />
      <line x1="-130" y1="0" x2="130" y2="0" stroke="#e8e6e1" stroke-width="0.8" opacity="0.25" stroke-dasharray="4 8" />
      <line x1="0" y1="-130" x2="0" y2="130" stroke="#e8e6e1" stroke-width="0.8" opacity="0.25" stroke-dasharray="4 8" />
      <circle cx="0" cy="0" r="22" fill="#e8e6e1" />
      <circle cx="104" cy="-38" r="8" fill="oklch(70% 0.18 45)" />
    </g>

    <!-- Wordmark block -->
    <g transform="translate(360, 220)">
      <!-- Mission label -->
      <line x1="0" y1="0" x2="34" y2="0" stroke="oklch(70% 0.18 45)" stroke-width="2" />
      <text x="46" y="5" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="3.5" fill="#8a8880">MISSION 01 // PRODUCT LAB</text>

      <!-- Big display wordmark -->
      <text x="0" y="90" font-family="Space Grotesk, system-ui, sans-serif" font-size="84" font-weight="500" fill="#e8e6e1" letter-spacing="-2.4">Apollo Digital</text>
      <text x="0" y="174" font-family="Space Grotesk, system-ui, sans-serif" font-size="84" font-weight="500" fill="#e8e6e1" letter-spacing="-2.4">Foundry</text>
      <text x="392" y="140" font-family="JetBrains Mono, monospace" font-size="28" fill="oklch(70% 0.18 45)">/01</text>

      <!-- Subline -->
      <text x="0" y="222" font-family="Space Grotesk, system-ui, sans-serif" font-size="22" fill="#8a8880">A product lab crafting apps, tools, and digital experiences.</text>
    </g>

    <!-- Bottom divider + footer row -->
    <line x1="48" y1="548" x2="1152" y2="548" stroke="#22252a" stroke-width="1" />
    <g font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="3" fill="#8a8880">
      <text x="90" y="588">APOLLODIGITALFOUNDRY.COM</text>
      <text x="600" y="588" text-anchor="middle">SPOKANE · WA · 47.66°N 117.43°W</text>
      <text x="1110" y="588" text-anchor="end">EST 2025 / SHIPPING 02</text>
    </g>
  </svg>
</body>
</html>
